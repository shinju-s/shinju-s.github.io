name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  schedule:
    # JST 0:00
    - cron: "0 15 * * *"

    # JST 6:00
    - cron: "0 21 * * *"

    # JST 12:00
    - cron: "0 3 * * *"

    # JST 18:00
    - cron: "0 9 * * *"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v6

      - name: Install, build, and upload site
        uses: withastro/action@v6

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5